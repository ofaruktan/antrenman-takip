// ─── STORAGE ──────────────────────────────────────────────────────────────────
const KEY="antrenman_v3";
function loadData(){
  try{
    let m={history:{},sessions:[],prs:{}};
    ["antrenman_v1","antrenman_v2","antrenman_v3"].forEach(k=>{
      try{
        const r=localStorage.getItem(k);if(!r)return;
        const d=JSON.parse(r);
        if(d.history)Object.entries(d.history).forEach(([id,entries])=>{
          if(!m.history[id])m.history[id]=[];
          entries.forEach(e=>{if(!m.history[id].some(x=>x.date===e.date))m.history[id].push(e);});
          m.history[id].sort((a,b)=>new Date(a.date)-new Date(b.date));
          if(m.history[id].length>30)m.history[id]=m.history[id].slice(-30);
        });
        if(d.sessions)d.sessions.forEach(s=>{if(!m.sessions.some(x=>x.date===s.date&&x.dayKey===s.dayKey))m.sessions.push(s);});
        if(d.prs)Object.entries(d.prs).forEach(([id,pr])=>{if(!m.prs[id]||pr>m.prs[id])m.prs[id]=pr;});
      }catch{}
    });
    m.sessions.sort((a,b)=>new Date(a.date)-new Date(b.date));
    localStorage.setItem(KEY,JSON.stringify(m));
    return m;
  }catch{return{history:{},sessions:[],prs:{}};}
}
function saveData(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}}
function getLastWeight(h,id){const e=(h[id]||[]);if(!e.length)return null;const m=Math.max(...e[e.length-1].sets.map(s=>parseFloat(s.weight)||0));return m>0?m:null;}
function getLastSets(h,id){const e=(h[id]||[]);return e.length?e[e.length-1].sets:null;}
function fmtDate(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("tr-TR",{day:"numeric",month:"short"});}
function fmtDateFull(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"});}

// ─── EXCEL EXPORT ─────────────────────────────────────────────────────────────
function exportExcel(data){
  const wb=XLSX.utils.book_new();
  const allEx=Object.values(PROGRAM).flatMap(d=>d.exercises);
  const ws1=XLSX.utils.aoa_to_sheet([
    ["İLERLEME TAKİP - 12 HAFTA"],
    ["Hafta","Tarih","Kilo(kg)","Bel(cm)","Göbek(cm)","Göğüs(cm)","Kol(cm)","Bacak(cm)","Yağ%","Notlar"],
    ["BAŞLANGIÇ","31.05.2026",72.6,"","","","","",17.1,"InBody ölçümü"],
    ...Array.from({length:12},(_,i)=>[`Hafta ${i+1}`,"","","","","","","","",""]),
    ["HEDEF","","70","","","","","","15","Kas artışı + yağ yakımı"],
  ]);
  ws1['!cols']=[{wch:14},{wch:14},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:8},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws1,"İlerleme Takibi");
  const ws2=XLSX.utils.aoa_to_sheet([
    ["TARİH","GÜN","TAMAMLANAN","TOPLAM","TAMAMLANMA %"],
    ...(data.sessions||[]).map(s=>{const d=PROGRAM[s.dayKey];return[fmtDateFull(s.date),`${d?.icon||""} ${d?.label||s.dayKey}`,s.completedCount,s.totalCount,Math.round((s.completedCount/s.totalCount)*100)+"%"];})
  ]);
  ws2['!cols']=[{wch:20},{wch:16},{wch:14},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,"Seans Geçmişi");
  const agirlikRows=[["EGZERSİZ","GRUP","TARİH","SET 1","SET 2","SET 3","SET 4","MAKS KG","PR"]];
  Object.entries(PROGRAM).forEach(([,day])=>{
    day.exercises.forEach(ex=>{
      (data.history[ex.id]||[]).forEach(entry=>{
        const sets=entry.sets||[];
        const maxKg=Math.max(...sets.map(s=>parseFloat(s.weight)||0));
        const pr=data.prs[ex.id]||0;
        agirlikRows.push([ex.name,day.label,fmtDateFull(entry.date),
          sets[0]?`${sets[0].weight}kg×${sets[0].reps}`:"",
          sets[1]?`${sets[1].weight}kg×${sets[1].reps}`:"",
          sets[2]?`${sets[2].weight}kg×${sets[2].reps}`:"",
          sets[3]?`${sets[3].weight}kg×${sets[3].reps}`:"",
          maxKg>0?maxKg:"",maxKg>=pr&&maxKg>0?"🏆 PR":""]);
      });
    });
  });
  const ws3=XLSX.utils.aoa_to_sheet(agirlikRows);
  ws3['!cols']=[{wch:28},{wch:8},{wch:20},{wch:14},{wch:14},{wch:14},{wch:14},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws3,"Ağırlık Geçmişi");
  const prRows=[["EGZERSİZ","GRUP","KİŞİSEL REKOR (kg)"]];
  Object.entries(data.prs||{}).forEach(([id,pr])=>{
    const ex=allEx.find(e=>e.id===id);
    const day=Object.entries(PROGRAM).find(([,d])=>d.exercises.some(e=>e.id===id));
    if(ex)prRows.push([ex.name,day?.[1]?.label||"",pr]);
  });
  const ws4=XLSX.utils.aoa_to_sheet(prRows);
  ws4['!cols']=[{wch:28},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws4,"Kişisel Rekorlar");
  const tarih=new Date().toLocaleDateString("tr-TR").replace(/\./g,"-");
  XLSX.writeFile(wb,`Antrenman_${tarih}.xlsx`);
}

function $(id){return document.getElementById(id);}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer(seconds){
  if(timerInterval)clearInterval(timerInterval);
  let left=seconds;
  const overlay=document.createElement("div");
  overlay.id="timer-overlay";
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;";
  overlay.innerHTML=`
    <div style="color:#fff;font-size:17px;margin-bottom:16px;opacity:0.7">Dinlenme süresi</div>
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="80" fill="none" stroke="#333" stroke-width="10"/>
      <circle id="tc" cx="90" cy="90" r="80" fill="none" stroke="#27ae60" stroke-width="10"
        stroke-dasharray="${2*Math.PI*80}" stroke-dashoffset="0" stroke-linecap="round"
        style="transform:rotate(-90deg);transform-origin:90px 90px;transition:stroke-dashoffset 1s linear,stroke 0.5s"/>
      <text id="tn" x="90" y="98" text-anchor="middle" fill="#fff" font-size="42" font-weight="700" font-family="monospace">${seconds}</text>
    </svg>
    <div style="color:#aaa;font-size:13px;margin-top:12px">Sıradaki set için hazırlan</div>
    <button id="skip-timer" style="margin-top:20px;background:transparent;border:2px solid #555;color:#aaa;border-radius:12px;padding:10px 28px;font-size:15px;">Atla</button>`;
  document.body.appendChild(overlay);
  document.getElementById("skip-timer").onclick=()=>stopTimer();
  timerInterval=setInterval(()=>{
    left--;
    const tn=document.getElementById("tn");
    const tc=document.getElementById("tc");
    if(tn)tn.textContent=left;
    if(tc){
      tc.style.strokeDashoffset=2*Math.PI*80*(1-left/seconds);
      tc.style.stroke=left>20?"#27ae60":left>10?"#e67e22":"#e74c3c";
    }
    if(left<=0)stopTimer();
  },1000);
}
function stopTimer(){
  clearInterval(timerInterval);
  const o=document.getElementById("timer-overlay");
  if(o)o.remove();
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function navHTML(active){
  const isW=active==="workout";
  const tabs=[{id:"home",icon:"🏠",label:"Ana Sayfa"},{id:"progress",icon:"📈",label:"Gelişim"},{id:"history",icon:"📋",label:"Geçmiş"}];
  return `<div style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0f0f0;display:flex;padding:8px 0;padding-bottom:calc(12px + env(safe-area-inset-bottom));z-index:100">
    <div id="nav-back" style="flex:1;text-align:center;cursor:pointer;opacity:${isW?1:0.25};pointer-events:${isW?"auto":"none"}">
      <div style="font-size:24px">‹</div>
      <div style="font-size:11px;color:${isW?"#c0392b":"#bbb"};font-weight:${isW?700:400}">Geri</div>
    </div>
    ${tabs.map(t=>`<div class="nav-tab" data-id="${t.id}" style="flex:1;text-align:center;cursor:pointer">
      <div style="font-size:24px">${t.icon}</div>
      <div style="font-size:11px;color:${active===t.id?"#2e6da4":"#bbb"};font-weight:${active===t.id?700:400}">${t.label}</div>
    </div>`).join("")}
  </div>`;
}

function bindNav(active){
  const backBtn=document.getElementById("nav-back");
  if(backBtn&&active==="workout"){
    backBtn.onclick=()=>renderHome();
  }
  document.querySelectorAll(".nav-tab").forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.id;
      if(id==="home")renderHome();
      else if(id==="progress")renderProgress();
      else if(id==="history")renderHistory();
    };
  });
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  screen="home";
  const weekDone=(appData.sessions||[]).filter(s=>new Date(s.date)>new Date(Date.now()-7*24*3600*1000)).length;
  const dayCards=Object.entries(PROGRAM).map(([key,day])=>{
    const last=[...(appData.sessions||[])].reverse().find(s=>s.dayKey===key);
    return `<div class="day-card" data-day="${key}" style="background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);cursor:pointer">
      <div style="width:52px;height:52px;border-radius:14px;background:${day.colorLight};display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">${day.icon}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:800;font-size:18px;color:${day.color}">${day.label}</span>
          ${key==="optional"?'<span style="font-size:11px;background:#fef9e7;color:#e67e22;padding:2px 8px;border-radius:20px;font-weight:600">Opsiyonel</span>':""}
        </div>
        <div style="font-size:13px;color:#777">${day.subtitle} · ${day.exercises.length} egzersiz</div>
        <div style="font-size:12px;color:#bbb;margin-top:2px">${last?`Son: ${fmtDate(last.date)}`:"Henüz yapılmadı"} · ${day.day}</div>
      </div>
      <div style="color:#ddd;font-size:24px">›</div>
    </div>`;
  }).join("");

  setHTML(`
    <div style="background:linear-gradient(135deg,#1a3a5c 0%,#2e6da4 100%);padding:calc(env(safe-area-inset-top)+24px) 20px 24px;color:#fff">
      <div style="font-size:27px;font-weight:900;letter-spacing:-0.5px">Antrenman Takip</div>
      <div style="font-size:13px;opacity:0.75;margin-top:3px">PPL Split · Salı / Perşembe / Cumartesi</div>
      <div style="margin-top:16px;display:flex;gap:12px">
        ${[["Bu hafta",weekDone],["Toplam",appData.sessions?.length||0],["PR",Object.keys(appData.prs||{}).length]].map(([l,v])=>`
          <div style="background:rgba(255,255,255,0.15);border-radius:12px;padding:12px 0;flex:1;text-align:center">
            <div style="font-size:28px;font-weight:800">${v}</div>
            <div style="font-size:11px;opacity:0.8">${l}</div>
          </div>`).join("")}
      </div>
    </div>
    <div style="padding:18px 14px 90px">
      <div style="font-weight:700;font-size:12px;color:#bbb;margin-bottom:12px;letter-spacing:1px">ANTRENMAN BAŞLAT</div>
      ${dayCards}
      <button id="export-btn" style="width:100%;margin-top:8px;padding:14px;background:#fff;color:#1a3a5c;border:2px solid #1a3a5c;border-radius:14px;font-size:16px;font-weight:700">
        📊 Excel'e Aktar
      </button>
    </div>
    ${navHTML("home")}`);

  document.querySelectorAll(".day-card").forEach(el=>{
    el.onclick=()=>startWorkout(el.dataset.day);
    el.addEventListener("touchstart",()=>el.style.transform="scale(0.98)",{passive:true});
    el.addEventListener("touchend",()=>el.style.transform="scale(1)",{passive:true});
  });
  document.getElementById("export-btn").onclick=()=>exportExcel(appData);
  bindNav("home");
}

// ─── WORKOUT ──────────────────────────────────────────────────────────────────
function startWorkout(dayKey){
  activeDay=dayKey;
  const day=PROGRAM[dayKey];
  ws={
    dayKey,phase:"warmup",
    sets:day.exercises.map(ex=>Array.from({length:ex.sets},()=>({weight:"",reps:""}))),
    completed:new Array(day.exercises.length).fill(false),
    activeEx:0,
    warmupDone:new Array(WARMUP[dayKey].length).fill(false),
    cooldownDone:new Array(COOLDOWN[dayKey].length).fill(false),
    prs:{...appData.prs},
    newPRs:[],
  };
  renderWarmup();
}

function renderWarmup(){
  const day=PROGRAM[ws.dayKey];
  const steps=WARMUP[ws.dayKey];
  setHTML(`
    <div style="background:${day.color};padding:calc(env(safe-area-inset-top)+20px) 20px 24px;color:#fff">
      <div style="font-size:24px;font-weight:800">🔥 Isınma</div>
      <div style="font-size:13px;opacity:0.8">${day.day} · ${day.label} · ~8 dakika</div>
    </div>
    <div style="padding:20px 16px 90px">
      <div style="font-size:13px;color:#999;margin-bottom:14px">Her adımı tamamladıkça işaretle 👇</div>
      ${steps.map((s,i)=>`
        <div class="w-step" data-i="${i}" style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid ${ws.warmupDone[i]?"#27ae60":"#f0e6c8"}">
          <div style="width:30px;height:30px;border-radius:50%;background:${ws.warmupDone[i]?"#27ae60":"#f39c12"};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0">${ws.warmupDone[i]?"✓":i+1}</div>
          <span style="font-size:14px;color:#444;text-decoration:${ws.warmupDone[i]?"line-through":"none"}">${s}</span>
        </div>`).join("")}
      <button id="warmup-go" style="width:100%;margin-top:12px;padding:16px;background:${day.color};color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700">
        ${ws.warmupDone.every(Boolean)?"Isınma Tamam — Başla 💪":"Atla ve Başla →"}
      </button>
    </div>
    ${navHTML("workout")}`);

  document.querySelectorAll(".w-step").forEach(el=>{
    el.onclick=()=>{ws.warmupDone[parseInt(el.dataset.i)]=!ws.warmupDone[parseInt(el.dataset.i)];renderWarmup();};
  });
  document.getElementById("warmup-go").onclick=()=>{ws.phase="training";renderTraining();};
  bindNav("workout");
}

function renderTraining(){
  const day=PROGRAM[ws.dayKey];
  const doneCount=ws.completed.filter(Boolean).length;
  const pct=Math.round((doneCount/day.exercises.length)*100);

  const cards=day.exercises.map((ex,i)=>{
    const isActive=ws.activeEx===i;
    const isDone=ws.completed[i];
    const lw=getLastWeight(appData.history,ex.id);
    const ls=getLastSets(appData.history,ex.id);
    const sets=ws.sets[i];
    const curMax=Math.max(...sets.map(s=>parseFloat(s.weight)||0));
    const isPRB=curMax>(ws.prs[ex.id]||0)&&curMax>0;
    const hasPR=(ws.prs[ex.id]||0)>0;
    const allFilled=sets.every(s=>s.weight!==""&&s.reps!=="");

    const setsHTML=isActive?sets.map((s,si)=>{
      const pw=ls?.[si]?.weight||lw||"";
      const pr2=ls?.[si]?.reps||"";
      const isSPR=s.weight!==""&&parseFloat(s.weight)>(ws.prs[ex.id]||0);
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0">
        <div style="width:28px;height:28px;border-radius:50%;background:${isSPR?"#fef3e2":"#f0f0f0"};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${isSPR?"#e67e22":"#666"};flex-shrink:0">${si+1}</div>
        <div style="flex:1">
          <div style="font-size:11px;color:#bbb;margin-bottom:4px">${pw?`Son: ${pw}kg × ${pr2}`:"İlk kayıt"}</div>
          <div style="display:flex;gap:8px">
            <div style="position:relative;flex:1">
              <input type="number" inputmode="decimal" placeholder="${pw||'kg'}" value="${s.weight}"
                class="set-inp" data-ei="${i}" data-si="${si}" data-f="weight"
                style="width:100%;padding:11px 28px 11px 12px;font-size:17px;font-weight:700;border:2px solid ${isSPR?"#f39c12":"#e8e8e8"};border-radius:10px;background:${isSPR?"#fff9f0":"#fafafa"}"/>
              <span style="position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:#bbb">kg</span>
            </div>
            <div style="position:relative;flex:1">
              <input type="number" inputmode="numeric" placeholder="${pr2||'rep'}" value="${s.reps}"
                class="set-inp" data-ei="${i}" data-si="${si}" data-f="reps"
                style="width:100%;padding:11px 28px 11px 12px;font-size:17px;font-weight:700;border:2px solid #e8e8e8;border-radius:10px;background:#fafafa"/>
              <span style="position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:#bbb">rep</span>
            </div>
          </div>
        </div>
        ${isSPR?'<div style="font-size:22px">🏆</div>':""}
      </div>`;
    }).join(""):"";

    return `<div style="background:#fff;border-radius:16px;margin-bottom:10px;border:2px solid ${isActive?"#2e6da4":isDone?"#27ae60":"#f0f0f0"};overflow:hidden">
      <div class="ex-hdr" data-i="${i}" style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:${isDone?"#f0fff4":"#fff"}">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-weight:700;font-size:15px;color:#1a1a1a">${ex.name}</span>
            ${hasPR?`<span style="background:linear-gradient(135deg,#f39c12,#e74c3c);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px">PR ${ws.prs[ex.id]}kg 🏆</span>`:""}
          </div>
          <div style="font-size:12px;color:#999;margin-top:2px">${ex.sets} set × ${ex.reps}${lw?`<span style="color:#2e6da4;margin-left:8px;font-weight:600">↑ Son: ${lw}kg</span>`:""}</div>
          <div style="font-size:11px;color:#bbb;margin-top:1px">${ex.note}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${isDone?'<span style="font-size:18px">✅</span>':""}
          <span style="font-size:20px;color:#ccc;transition:transform 0.2s;transform:${isActive?"rotate(180deg)":"none"}">⌄</span>
        </div>
      </div>
      ${isActive?`<div style="padding:0 16px 16px">
        <div style="border-top:1px solid #f5f5f5;padding-top:10px">${setsHTML}</div>
        ${isPRB?`<div style="background:#fff9f0;border:1px solid #f39c12;border-radius:10px;padding:8px 12px;margin-top:10px;font-size:13px;color:#e67e22;font-weight:600">🏆 Yeni PR kırıyorsun! (${curMax}kg)</div>`:""}
        <button class="done-btn" data-i="${i}" ${!allFilled?"disabled":""} style="width:100%;margin-top:12px;padding:14px;background:${allFilled?"#27ae60":"#e8e8e8"};color:${allFilled?"#fff":"#bbb"};border:none;border-radius:12px;font-size:16px;font-weight:700">
          ${isDone?"✓ Güncellendi":"Egzersizi Tamamla ✓"}
        </button>
      </div>`:""}
      ${isDone&&!isActive?`<div style="padding:5px 16px 10px;display:flex;gap:6px;flex-wrap:wrap">
        ${sets.map((s,si)=>`<span style="font-size:12px;background:#e8f8ef;color:#1e8449;padding:3px 10px;border-radius:20px">S${si+1}: ${s.weight}kg × ${s.reps}</span>`).join("")}
      </div>`:""}
    </div>`;
  }).join("");

  setHTML(`
    <div style="background:${day.color};padding:calc(env(safe-area-inset-top)+16px) 20px 18px;color:#fff;position:sticky;top:0;z-index:10">
      <div style="font-size:13px;opacity:0.8">${day.day} antrenmanı</div>
      <div style="font-size:24px;font-weight:800">${day.icon} ${day.label}</div>
      <div style="font-size:13px;opacity:0.75;margin-bottom:12px">${day.subtitle}</div>
      <div style="background:rgba(255,255,255,0.25);border-radius:10px;height:8px">
        <div style="height:8px;border-radius:10px;background:#fff;width:${pct}%;transition:width 0.4s"></div>
      </div>
      <div style="margin-top:6px;font-size:13px;opacity:0.9">${doneCount}/${day.exercises.length} egzersiz</div>
    </div>
    <div style="padding:14px 14px 90px">
      ${cards}
      <button id="to-cool" ${doneCount===0?"disabled":""} style="width:100%;padding:16px;margin-top:8px;background:${doneCount>0?day.color:"#ccc"};color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700">
        Soğumaya Geç (${doneCount}/${day.exercises.length}) →
      </button>
    </div>
    ${navHTML("workout")}`);

  document.querySelectorAll(".ex-hdr").forEach(el=>{
    el.onclick=()=>{const i=parseInt(el.dataset.i);ws.activeEx=ws.activeEx===i?-1:i;renderTraining();};
  });
  document.querySelectorAll(".set-inp").forEach(inp=>{
    inp.oninput=()=>{ws.sets[parseInt(inp.dataset.ei)][parseInt(inp.dataset.si)][inp.dataset.f]=inp.value;};
  });
  document.querySelectorAll(".done-btn").forEach(btn=>{
    if(!btn.disabled)btn.onclick=()=>{
      const i=parseInt(btn.dataset.i);
      const ex=day.exercises[i];
      const maxW=Math.max(...ws.sets[i].map(s=>parseFloat(s.weight)||0));
      if(maxW>(ws.prs[ex.id]||0)){ws.prs[ex.id]=maxW;ws.newPRs.push(`${ex.name} — ${maxW}kg`);}
      ws.completed[i]=true;
      if(i<day.exercises.length-1)ws.activeEx=i+1;
      renderTraining();
      setTimeout(()=>startTimer(ex.rest),100);
    };
  });
  const toCoool=document.getElementById("to-cool");
  if(toCoool&&doneCount>0)toCoool.onclick=()=>{ws.phase="cooldown";renderCooldown();};
  bindNav("workout");
}

function renderCooldown(){
  const day=PROGRAM[ws.dayKey];
  const steps=COOLDOWN[ws.dayKey];
  setHTML(`
    <div style="background:#2e6da4;padding:calc(env(safe-area-inset-top)+20px) 20px 24px;color:#fff">
      <div style="font-size:24px;font-weight:800">❄️ Soğuma</div>
      <div style="font-size:13px;opacity:0.8">${day.label} · Antrenman Bitti ✓ · ~6 dakika</div>
    </div>
    <div style="padding:20px 16px 90px">
      ${ws.newPRs.length>0?`<div style="background:#fff9f0;border:2px solid #f39c12;border-radius:16px;padding:16px;margin-bottom:16px">
        <div style="font-weight:700;color:#e67e22;margin-bottom:6px">🏆 Yeni Kişisel Rekor!</div>
        ${ws.newPRs.map(n=>`<div style="font-size:14px;color:#555;margin-top:3px">${n}</div>`).join("")}
      </div>`:""}
      ${steps.map((s,i)=>`
        <div class="c-step" data-i="${i}" style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid ${ws.cooldownDone[i]?"#27ae60":"#d6eaf8"}">
          <div style="width:30px;height:30px;border-radius:50%;background:${ws.cooldownDone[i]?"#27ae60":"#2e6da4"};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0">${ws.cooldownDone[i]?"✓":i+1}</div>
          <span style="font-size:14px;color:#444;text-decoration:${ws.cooldownDone[i]?"line-through":"none"}">${s}</span>
        </div>`).join("")}
      <button id="finish" style="width:100%;margin-top:12px;padding:16px;background:#1a3a5c;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700">
        Antrenmanı Bitir 🎉
      </button>
    </div>
    ${navHTML("workout")}`);

  document.querySelectorAll(".c-step").forEach(el=>{
    el.onclick=()=>{ws.cooldownDone[parseInt(el.dataset.i)]=!ws.cooldownDone[parseInt(el.dataset.i)];renderCooldown();};
  });
  document.getElementById("finish").onclick=()=>finishWorkout();
  bindNav("workout");
}

function finishWorkout(){
  const day=PROGRAM[ws.dayKey];
  const newHistory={...appData.history};
  day.exercises.forEach((ex,i)=>{
    if(ws.completed[i]){
      if(!newHistory[ex.id])newHistory[ex.id]=[];
      newHistory[ex.id].push({date:new Date().toISOString(),sets:ws.sets[i]});
      if(newHistory[ex.id].length>30)newHistory[ex.id].shift();
    }
  });
  appData={history:newHistory,sessions:[...(appData.sessions||[]).slice(-99),{date:new Date().toISOString(),dayKey:ws.dayKey,completedCount:ws.completed.filter(Boolean).length,totalCount:day.exercises.length}],prs:ws.prs};
  saveData(appData);
  const prs=ws.newPRs;
  setHTML(`
    <div style="min-height:100vh;background:#f7f8fa;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">
      <div style="font-size:80px;animation:bounce 0.5s ease 3">🎉</div>
      <div style="font-size:30px;font-weight:900;margin-top:16px;color:#1a3a5c">Harika iş!</div>
      <div style="font-size:15px;color:#999;margin-top:6px">Antrenman tamamlandı</div>
      ${prs.length>0?`<div style="background:#fff9f0;border:2px solid #f39c12;border-radius:16px;padding:16px;margin-top:20px;width:100%;max-width:320px">
        <div style="font-weight:700;color:#e67e22;margin-bottom:8px">🏆 Yeni Kişisel Rekor!</div>
        ${prs.map(n=>`<div style="font-size:14px;color:#555;margin-top:4px">${n}</div>`).join("")}
      </div>`:""}
      <button id="go-home" style="margin-top:28px;background:#1a3a5c;color:#fff;border:none;border-radius:14px;padding:16px 40px;font-size:17px;font-weight:700;width:100%;max-width:320px">
        Ana Sayfaya Dön
      </button>
    </div>`);
  document.getElementById("go-home").onclick=()=>renderHome();
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress(){
  screen="progress";
  const sel=window._ps||"push";
  const day=PROGRAM[sel];
  const allEx=Object.values(PROGRAM).flatMap(d=>d.exercises);

  setHTML(`
    <div style="padding:calc(env(safe-area-inset-top)+16px) 16px 0">
      <div style="font-weight:800;font-size:22px;margin-bottom:2px">📈 Gelişim</div>
      <div style="color:#999;font-size:14px;margin-bottom:16px">Son ağırlıklar · Kişisel rekorlar</div>
    </div>
    <div style="display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto">
      ${Object.entries(PROGRAM).map(([k,v])=>`<button class="p-tab" data-k="${k}" style="padding:8px 14px;border-radius:20px;border:none;background:${sel===k?v.color:"#f0f0f0"};color:${sel===k?"#fff":"#555"};font-weight:700;font-size:13px;flex-shrink:0">${v.icon} ${v.label}</button>`).join("")}
    </div>
    <div style="padding:0 16px 90px">
      <div style="background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px">
        <div style="padding:12px 16px;background:${day.color};color:#fff;font-weight:700;font-size:13px">Son Kaydedilen Ağırlıklar</div>
        ${day.exercises.map((ex,i)=>{
          const lw=getLastWeight(appData.history,ex.id);
          const ls=getLastSets(appData.history,ex.id);
          const pr=appData.prs?.[ex.id];
          return `<div class="ex-det" data-id="${ex.id}" style="padding:12px 16px;border-bottom:${i<day.exercises.length-1?"1px solid #f5f5f5":"none"};display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:${window._oe===ex.id?"#f8fbff":"#fff"}">
            <div>
              <div style="font-size:14px;font-weight:600;color:#222">${ex.name}</div>
              ${window._oe===ex.id&&ls?`<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">${ls.map((s,si)=>`<span style="font-size:11px;background:#e8f0fe;color:#1a6b9a;padding:2px 8px;border-radius:12px">S${si+1}: ${s.weight}kg×${s.reps}</span>`).join("")}</div>`:""}
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px">
              ${lw?`<div style="font-size:18px;font-weight:800;color:${day.color}">${lw}kg</div>${pr&&pr===lw?'<div style="font-size:10px;color:#e67e22">🏆 PR</div>':""}`:
              '<div style="font-size:12px;color:#ccc">Kayıt yok</div>'}
            </div>
          </div>`;
        }).join("")}
      </div>
      <div style="background:#fff;border-radius:14px;padding:16px">
        <div style="font-weight:700;font-size:16px;margin-bottom:12px">🏆 Kişisel Rekorlar</div>
        ${Object.keys(appData.prs||{}).length===0?
          '<div style="color:#bbb;font-size:13px;text-align:center;padding:12px 0">Henüz PR yok — antrenman yaptıkça burada görünecek!</div>':
          Object.entries(appData.prs||{}).map(([id,pr])=>{
            const ex=allEx.find(e=>e.id===id);
            if(!ex)return"";
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5">
              <span style="font-size:14px;color:#333">${ex.name}</span>
              <span style="font-weight:800;font-size:16px;color:#e67e22">${pr} kg 🏆</span>
            </div>`;
          }).join("")}
      </div>
    </div>
    ${navHTML("progress")}`);

  document.querySelectorAll(".p-tab").forEach(el=>{
    el.onclick=()=>{window._ps=el.dataset.k;window._oe=null;renderProgress();};
  });
  document.querySelectorAll(".ex-det").forEach(el=>{
    el.onclick=()=>{window._oe=window._oe===el.dataset.id?null:el.dataset.id;renderProgress();};
  });
  bindNav("progress");
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory(){
  screen="history";
  const sessions=[...(appData.sessions||[])].reverse();
  const grouped={};
  sessions.forEach(s=>{const d=fmtDate(s.date);if(!grouped[d])grouped[d]=[];grouped[d].push(s);});

  setHTML(`
    <div style="padding:calc(env(safe-area-inset-top)+16px) 16px 0">
      <div style="font-weight:800;font-size:22px;margin-bottom:2px">📋 Geçmiş</div>
      <div style="color:#999;font-size:14px;margin-bottom:18px">${appData.sessions?.length||0} antrenman kaydı</div>
    </div>
    <div style="padding:0 16px 90px">
      ${Object.keys(grouped).length===0?
        '<div style="text-align:center;padding:48px;color:#bbb"><div style="font-size:52px;margin-bottom:12px">🏋️</div><div style="font-size:16px">Henüz kayıt yok</div></div>':
        Object.entries(grouped).map(([date,list])=>`
          <div style="margin-bottom:20px">
            <div style="font-weight:700;font-size:12px;color:#bbb;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${date}</div>
            ${list.map(s=>{const d=PROGRAM[s.dayKey];return`
              <div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:8px;border-left:4px solid ${d?.color||"#ccc"}">
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div>
                    <div style="font-weight:700;font-size:16px">${d?.icon} ${d?.label}</div>
                    <div style="font-size:12px;color:#999">${d?.subtitle}</div>
                  </div>
                  <div style="background:${s.completedCount===s.totalCount?"#e8f8ef":"#fef9e7"};color:${s.completedCount===s.totalCount?"#27ae60":"#e67e22"};padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700">
                    ${s.completedCount}/${s.totalCount}
                  </div>
                </div>
              </div>`;}).join("")}
          </div>`).join("")}
    </div>
    ${navHTML("history")}`);
  bindNav("history");
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if("serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{});}
renderHome();
</script>
</body>
</html>
